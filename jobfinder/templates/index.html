<!DOCTYPE html>
<html lang="zh" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobFinder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    body { height: 100vh; overflow: hidden; }
    #left-aside { height: calc(100vh - 56px); }

    /* ── Global input focus: blue glow ── */
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6 !important;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }
    #list { overflow-y: auto; }
    pre { white-space: pre-wrap; word-break: break-word; }

    /* ── Three-panel layout ── */
    #main-area {
      display: flex; flex: 1;
      height: calc(100vh - 56px);
      overflow: hidden;
    }
    #job-detail-view {
      display: none; flex: 1;
      overflow-y: auto;
      border-right: 1px solid #e5e7eb;
    }
    .dark #job-detail-view { border-right-color: #374151; }

    #search-panel {
      flex: 1;
      overflow-y: auto;
      transition: width .25s ease, flex .25s ease;
    }
    #search-inner {
      max-width: 36rem; margin: 0 auto;
      padding: 2rem;
      transition: padding .2s ease;
    }

    /* When a job is selected, detail takes flex-1 and search panel shrinks to sidebar */
    #main-area.detail-active #job-detail-view {
      display: block;
    }
    #main-area.detail-active #search-panel {
      flex: none;
      width: 288px;
      border-left: 1px solid #e5e7eb;
    }
    .dark #main-area.detail-active #search-panel { border-left-color: #374151; }
    #main-area.detail-active #search-inner {
      max-width: none !important;
      margin: 0 !important;
      padding: 1rem !important;
    }
#sel-box {
      position: fixed; pointer-events: none; z-index: 999;
      background: rgba(59,130,246,.12);
      border: 1.5px solid rgba(59,130,246,.55);
      border-radius: 3px;
    }
    .drag-over { border-color: #3b82f6 !important; background: rgba(59,130,246,.08) !important; }
    #progress-log {
      overflow-y: auto;
      max-height: calc(100vh - 56px - 7rem); /* 视口 - 导航栏 - spinner行 - 内外边距 */
    }
    #progress-log p { animation: fadeIn .3s ease; }
    #step-progress { display: none; }
    #step-progress.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; } }
    @keyframes discoverSlide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    .animate-discover-slide { animation: discoverSlide 1.2s ease-in-out infinite; }

    /* ── Log panel ── */
    #log-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
      background: #0f172a;
      border-top: 1px solid #1e293b;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform .25s ease, height .25s ease;
      height: 300px;
    }
    #log-panel.open { transform: translateY(0); }
    #log-lines { overflow-y: auto; flex: 1; font-family: ui-monospace, monospace; font-size: 12px; line-height: 1.6; padding: 8px 12px; }
    .log-ERROR   { color: #f87171; }
    .log-WARNING { color: #fbbf24; }
    .log-INFO    { color: #94a3b8; }
    .log-DEBUG   { color: #475569; }
    .log-unknown { color: #64748b; }
    #log-panel .log-search-match { background: rgba(250,204,21,.25); border-radius: 2px; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 font-sans text-gray-800 dark:text-gray-100 transition-colors duration-200">

<!-- ── API Config Overlay ──────────────────────────────────────────────────── -->
<!-- ── History Page ─────────────────────────────────────────────────────── -->
<div id="history-page" class="hidden fixed inset-0 bg-gray-900/95 z-50 overflow-y-auto">
  <div class="max-w-4xl mx-auto px-4 py-12">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-white" data-i18n="hist.title">搜索历史</h1>
      <div class="flex items-center gap-3">
        <button onclick="clearHistory()"
          class="text-xs px-3 py-1.5 rounded-lg bg-red-900/40 hover:bg-red-800/60 text-red-400 hover:text-red-300 transition-colors border border-red-800/50"
          data-i18n="hist.clear">清空历史</button>
        <button onclick="closeHistoryPage()"
          class="text-gray-400 hover:text-white transition-colors p-1 rounded-lg hover:bg-gray-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 全量累计 -->
    <div id="hist-summary" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8"></div>

    <!-- 历史记录表格 -->
    <div class="bg-gray-800 rounded-xl overflow-hidden">
      <table class="w-full text-sm text-left">
        <thead class="text-xs text-gray-400 uppercase bg-gray-700/50">
          <tr>
            <th class="px-4 py-3" data-i18n="hist.col_time">时间</th>
            <th class="px-4 py-3" data-i18n="hist.col_roles">职位 / 地区</th>
            <th class="px-4 py-3" data-i18n="hist.col_model">模型</th>
            <th class="px-4 py-3 text-right" data-i18n="hist.col_elapsed">耗时</th>
            <th class="px-4 py-3 text-right" data-i18n="hist.col_tokens_in">输入 tokens</th>
            <th class="px-4 py-3 text-right" data-i18n="hist.col_tokens_out">输出 tokens</th>
            <th class="px-4 py-3 text-right" data-i18n="hist.col_jobs">职位数</th>
            <th class="px-4 py-3 text-right" data-i18n="hist.col_funnel">漏斗</th>
          </tr>
        </thead>
        <tbody id="hist-tbody" class="divide-y divide-gray-700 text-gray-300 font-mono text-xs"></tbody>
      </table>
      <p id="hist-empty" class="hidden text-center text-gray-500 py-12 text-sm" data-i18n="hist.empty">暂无搜索记录</p>
    </div>
  </div>
</div>

<div id="config-page" class="hidden fixed inset-0 bg-gray-900/95 z-50 overflow-y-auto">
  <div class="max-w-2xl mx-auto px-5 py-12">
    <div class="flex items-start justify-between mb-2">
      <h1 class="text-2xl font-bold text-white" data-i18n="cfg.title"></h1>
      <button onclick="closeConfigPage()"
        class="text-gray-400 hover:text-white transition-colors p-1 rounded-lg hover:bg-gray-700 flex-shrink-0 mt-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <p class="text-gray-400 text-sm mb-8" data-i18n="cfg.subtitle"></p>

    <!-- Default provider selector -->
    <div class="bg-gray-800 rounded-xl p-5 mb-6">
      <h2 class="text-sm font-semibold text-gray-300 mb-3" data-i18n="cfg.default_model"></h2>
      <div class="flex gap-3 items-center">
        <select id="cfg-default-provider"
          class="w-36 flex-shrink-0 bg-gray-700 border border-gray-600 text-white rounded-lg px-3 py-2 text-sm
                 focus:outline-none focus:ring-1 focus:ring-blue-500">
        </select>
        <select id="cfg-default-model"
          class="flex-1 min-w-0 bg-gray-700 border border-gray-600 text-white rounded-lg px-3 py-2 text-sm
                 focus:outline-none focus:ring-1 focus:ring-blue-500 truncate">
        </select>
        <button id="cfg-save-default-btn" onclick="saveDefaultModel()" disabled
          class="flex-shrink-0 px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 disabled:cursor-not-allowed
                 text-white text-sm rounded-lg transition-colors whitespace-nowrap opacity-50">
          <span data-i18n="cfg.save_default"></span>
        </button>
      </div>
    </div>

    <!-- Model API -->
    <div class="flex gap-4 mb-8 items-start">
      <!-- Left: action buttons -->
      <div class="flex flex-col gap-3 flex-shrink-0 w-32">
        <button id="refresh-models-btn" onclick="refreshModels()"
          class="w-full px-3 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs rounded-lg transition-colors flex flex-col items-center gap-1.5">
          <svg id="refresh-models-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          <span data-i18n="cfg.refresh_models" class="text-center leading-tight"></span>
        </button>
        <button onclick="clearCache()"
          class="w-full px-3 py-2.5 bg-red-600 hover:bg-red-700 text-white text-xs rounded-lg transition-colors flex flex-col items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
          <span data-i18n="cfg.cache_clear" class="text-center leading-tight"></span>
        </button>
        <button onclick="clearAllApiKeys()"
          class="w-full px-3 py-2.5 bg-orange-600 hover:bg-orange-700 text-white text-xs rounded-lg transition-colors flex flex-col items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
          </svg>
          <span data-i18n="cfg.clear_keys" class="text-center leading-tight"></span>
        </button>
        <button id="restore-models-btn" onclick="resetModelList()"
          class="w-full px-3 py-2.5 bg-purple-600 hover:bg-purple-700 text-white text-xs rounded-lg transition-colors flex flex-col items-center gap-1.5 hidden">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
          </svg>
          <span data-i18n="cfg.restore_models" class="text-center leading-tight"></span>
        </button>
      </div>
      <!-- Right: provider list -->
      <div class="flex-1 min-w-0">
        <h2 class="text-sm font-semibold text-white mb-3 text-center" data-i18n="cfg.model_api_title"></h2>
        <div id="cfg-providers" class="space-y-[21px]"></div>
        <button id="cfg-providers-toggle" onclick="toggleProviderList()"
          class="mt-3 w-full py-2 text-xs text-gray-400 hover:text-white bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors flex items-center justify-center gap-1.5">
          <svg id="cfg-providers-toggle-icon" class="w-3.5 h-3.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
          <span id="cfg-providers-toggle-label"></span>
        </button>
      </div>
    </div>

    <!-- Job Search API (optional) -->
    <div class="flex gap-4 mb-8 items-start">
      <!-- Left: spacer matching model API button column -->
      <div class="flex-shrink-0 w-32"></div>
      <!-- Right: Adzuna card -->
      <div class="flex-1 min-w-0">
        <h2 class="text-sm font-semibold text-white mb-3 text-center" data-i18n="cfg.job_api_title"></h2>
        <div class="bg-gray-800 rounded-xl p-4 relative space-y-3">
        <p class="text-xs text-gray-400" data-i18n="cfg.job_api_desc"></p>
          <div class="flex items-center justify-between">
            <span class="font-medium text-sm text-white">Adzuna</span>
            <span id="status-adzuna" class="text-xs px-2 py-0.5 rounded-full bg-gray-700 text-gray-500"></span>
          </div>
          <div class="flex gap-2 items-center">
            <input type="text" id="key-adzuna-id" placeholder="ADZUNA_APP_ID"
              class="flex-1 min-w-0 bg-gray-700 border border-gray-600 text-white text-xs rounded-lg px-3 py-2
                     focus:outline-none focus:ring-1 focus:ring-blue-500 placeholder-gray-500"
              autocomplete="off"/>
            <button onclick="saveAdzunaKey()"
              class="flex-shrink-0 px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs rounded-lg transition-colors whitespace-nowrap">
              <span data-i18n="cfg.save"></span>
            </button>
          </div>
          <div class="flex gap-2 items-center">
            <input type="password" id="key-adzuna-key" placeholder="ADZUNA_APP_KEY"
              class="flex-1 min-w-0 bg-gray-700 border border-gray-600 text-white text-xs rounded-lg px-3 py-2
                     focus:outline-none focus:ring-1 focus:ring-blue-500 placeholder-gray-500"
              autocomplete="off"/>
            <button onclick="saveAdzunaKey()"
              class="flex-shrink-0 px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs rounded-lg transition-colors whitespace-nowrap opacity-0 pointer-events-none">
              <span data-i18n="cfg.save"></span>
            </button>
          </div>
          <p id="test-msg-adzuna" class="absolute left-4 right-4 -bottom-4 z-10 text-xs truncate leading-none text-transparent"></p>
        </div>
      </div>
    </div>

    <button id="cfg-continue"
      class="w-full py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 disabled:cursor-not-allowed
             text-white font-semibold rounded-xl transition-colors"
      onclick="closeConfigPage()">
      <span data-i18n="cfg.enter"></span>
    </button>
  </div>
</div>

<!-- ── Top bar ────────────────────────────────────────────────────────────── -->
<header class="h-14 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center px-6 gap-4 shadow-sm z-10 relative">
  <span class="text-lg font-bold text-blue-600 dark:text-blue-400 cursor-pointer select-none"
    onclick="location.reload()">JobFinder</span>
  <span id="app-version" class="text-xs text-gray-400 dark:text-gray-600 font-mono select-none"></span>
  <span id="summary" class="text-sm text-gray-400 dark:text-gray-500"></span>
  <div class="ml-auto flex items-center gap-3">
    <button onclick="openConfigPage()"
      class="text-xs text-gray-400 dark:text-gray-500 hover:text-blue-500 transition-colors flex items-center gap-1">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span data-i18n="nav.config">API 配置</span>
    </button>
    <button onclick="openHistoryPage()"
      class="text-xs text-gray-400 dark:text-gray-500 hover:text-blue-500 transition-colors flex items-center gap-1">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span data-i18n="nav.history">历史</span>
    </button>
    <button id="log-btn" onclick="toggleLogPanel()" data-i18n-title="tip.view_logs"
      class="text-xs text-gray-400 dark:text-gray-500 hover:text-blue-500 transition-colors flex items-center gap-1">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 12h6m-6 4h6M5 8h14M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <span data-i18n="nav.logs">日志</span>
    </button>
    <span id="session-tokens" class="hidden text-xs font-mono text-purple-400 dark:text-purple-300"
      data-i18n-title="tip.session_tokens"></span>
    <span id="mock-badge" class="hidden text-xs px-2 py-0.5 rounded-full bg-yellow-100 dark:bg-yellow-900/40 text-yellow-700 dark:text-yellow-300 font-medium">TEST</span>
    <!-- Language toggle -->
    <div class="flex items-center gap-0.5 bg-gray-100 dark:bg-gray-700 rounded-lg p-0.5">
      <button onclick="setLang('zh')" id="lang-zh"
        class="lang-btn text-xs px-2 py-0.5 rounded-md transition-colors font-medium">中</button>
      <button onclick="setLang('en')" id="lang-en"
        class="lang-btn text-xs px-2 py-0.5 rounded-md transition-colors font-medium">EN</button>
      <button onclick="setLang('es')" id="lang-es"
        class="lang-btn text-xs px-2 py-0.5 rounded-md transition-colors font-medium">ES</button>
    </div>
  <span class="text-xs text-gray-400 dark:text-gray-500" id="mode-label"></span>
    <button id="dark-toggle"
      class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-200 focus:outline-none bg-gray-200 dark:bg-blue-600"
      aria-label="切换深色模式">
      <span id="toggle-knob"
        class="inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform duration-200 translate-x-1 dark:translate-x-6"></span>
    </button>
    <svg id="icon-sun" class="w-4 h-4 text-yellow-400 hidden dark:block" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 1.78a1 1 0 011.42 1.42l-.7.7a1 1 0 11-1.42-1.42l.7-.7zM18 9a1 1 0 110 2h-1a1 1 0 110-2h1zM4.22 15.78a1 1 0 001.42-1.42l-.7-.7a1 1 0 00-1.42 1.42l.7.7zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM3 10a1 1 0 110 2H2a1 1 0 110-2h1zm13.78-5.78a1 1 0 00-1.42 1.42l.7.7a1 1 0 001.42-1.42l-.7-.7zM6 10a4 4 0 118 0 4 4 0 01-8 0z" clip-rule="evenodd"/>
    </svg>
    <svg id="icon-moon" class="w-4 h-4 text-gray-500 block dark:hidden" fill="currentColor" viewBox="0 0 20 20">
      <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
    </svg>
  </div>
</header>

<div class="flex h-full">

  <!-- ── Left: Job List ──────────────────────────────────────────────────── -->
  <aside id="left-aside" class="w-96 min-w-80 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col">

    <!-- Search + Sort -->
    <div class="px-3 pt-3 pb-2 border-b border-gray-200 dark:border-gray-700 space-y-2">
      <div class="flex items-center gap-2">
        <div class="relative flex-1">
          <svg class="absolute left-2 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400 pointer-events-none"
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
          </svg>
          <input id="search-input" type="text" data-i18n-ph="list.search_placeholder"
            class="w-full pl-7 pr-2 py-1.5 text-xs rounded-md border border-gray-200 dark:border-gray-600
                   bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-gray-100
                   placeholder-gray-400 dark:placeholder-gray-500
                   focus:outline-none focus:ring-1 focus:ring-blue-400"/>
        </div>
        <div class="relative flex-shrink-0">
          <select id="sort-select"
            class="appearance-none pl-2 pr-6 py-1.5 text-xs rounded-md border border-gray-200 dark:border-gray-600
                   bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-200
                   focus:outline-none focus:ring-1 focus:ring-blue-400 cursor-pointer">
            <option value="score" data-i18n="list.sort_score"></option>
            <option value="date" data-i18n="list.sort_date"></option>
          </select>
          <svg class="absolute right-1.5 top-1/2 -translate-y-1/2 w-3 h-3 text-gray-400 pointer-events-none"
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>
      </div>

      <div class="flex gap-1 items-center">
        <div class="flex gap-1 flex-1" id="date-filter">
          <button data-range="all"   class="date-btn flex-1 text-xs py-1 rounded-md transition-colors" data-i18n="list.filter_all"></button>
          <button data-range="today" class="date-btn flex-1 text-xs py-1 rounded-md transition-colors" data-i18n="list.filter_today"></button>
          <button data-range="week"  class="date-btn flex-1 text-xs py-1 rounded-md transition-colors" data-i18n="list.filter_week"></button>
        </div>
        <!-- Score filter -->
        <div class="relative flex-shrink-0" id="score-filter-wrap">
          <button id="score-filter-btn" onclick="toggleScoreDropdown()"
            class="flex items-center gap-1 px-2 py-1 text-xs rounded-md border transition-colors

        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

        </svg>
        <span data-i18n="list.delete"></span>

      <button id="cancel-delete-btn"

      </button>

  </aside>

  <!-- ── Right: Detail + Search Panel (three-panel when card selected) ──── -->
  <div id="main-area">

    <!-- Job detail view (hidden by default, flex-1 when active) -->

    </div>

    <!-- Search / upload panel (always visible; full-width → sidebar on card select) -->
    <div id="search-panel" class="bg-gray-50 dark:bg-gray-900">

      <div id="search-inner" class="space-y-6">

        <!-- Step 1: CV Upload -->
        <div id="step-upload" class="space-y-4">
          <h2 class="text-lg font-semibold text-gray-700 dark:text-gray-200" data-i18n="upload.title"></h2>
          <div id="drop-zone"
            class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-10 text-center
                   cursor-pointer hover:border-blue-400 transition-colors"

            ondragover="handleDragOver(event)"
            ondragleave="handleDragLeave(event)"
            ondrop="handleDrop(event)">
            <svg class="w-10 h-10 mx-auto mb-3 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p class="text-sm text-gray-500 dark:text-gray-400"><span data-i18n="upload.drop"></span><span class="text-blue-500 ml-1" data-i18n="upload.click"></span></p>
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-1" data-i18n="upload.formats"></p>
            <input id="cv-file-input" type="file" accept=".docx,.md" class="hidden" onchange="handleFileSelect(this.files[0])"/>

          <div id="parse-status" class="hidden text-sm text-center text-gray-400">
            <svg class="inline w-4 h-4 mr-1 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            <span data-i18n="upload.parsing"></span>
          </div>
        </div>

        <!-- Step 2: Profile + Title confirmation (hidden until CV parsed) -->
        <div id="step-titles" class="hidden space-y-4">
          <div id="profile-card" class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
            <div class="flex items-start justify-between gap-4">
              <div>
                <h3 id="prof-name" class="font-semibold text-gray-800 dark:text-gray-100 text-base"></h3>
                <p id="prof-summary" class="text-sm text-gray-500 dark:text-gray-400 mt-1"></p>
              </div>
              <div class="flex items-center gap-2 flex-shrink-0">
                <span id="prof-seniority"
                  class="px-2.5 py-0.5 text-xs font-medium rounded-full bg-blue-100 dark:bg-blue-900/40
                         text-blue-700 dark:text-blue-300 whitespace-nowrap"></span>
                <button onclick="swapCV()" title="更换 CV"
                  class="p-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors rounded">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="flex flex-wrap gap-1.5 mt-3">
            </div>
          </div>

          <!-- Location -->
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5" data-i18n="titles.location"></label>
            <select id="location-select"
              class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600
                     text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-blue-400">
              <option value="ireland">爱尔兰 🇮🇪</option>
              <option value="uk">英国 🇬🇧</option>
              <option value="usa">美国 🇺🇸</option>
              <option value="canada">加拿大 🇨🇦</option>
              <option value="australia">澳大利亚 🇦🇺</option>
              <option value="germany">德国 🇩🇪</option>
              <option value="singapore">新加坡 🇸🇬</option>
              <option value="remote">Remote 全球</option>
            </select>
          </div>

          <!-- Titles -->
          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300" data-i18n="titles.roles"></label>
              <button id="discover-btn" onclick="discoverTitles()"

                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                <span data-i18n="titles.discover"></span>
              </button>
            </div>
            <!-- 市场发现进度条 -->
            <div id="discover-progress" class="hidden h-1 rounded-full bg-gray-200 dark:bg-gray-700 overflow-hidden mb-2">
              <div class="h-full w-1/3 rounded-full bg-blue-500 animate-discover-slide"></div>
            </div>
            <div id="titles-list" class="space-y-1.5"></div>
            <div class="flex gap-2 mt-2">
              <input id="add-title-input" type="text" data-i18n-ph="titles.add_placeholder"
                class="flex-1 text-xs bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600
                       rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-blue-400"
                onkeydown="if(event.key==='Enter') addTitle()"/>
              <button onclick="addTitle()"
                class="px-3 py-1.5 text-xs bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors"
                data-i18n="titles.add">
              </button>
            </div>
          </div>

          <!-- Source + Limit per role -->
          <div class="space-y-2">
            <label class="text-sm text-gray-600 dark:text-gray-400" data-i18n="titles.limit_label"></label>
            <div class="space-y-1.5">
              <!-- Indeed row -->
              <div class="flex items-center gap-3">
                <input id="source-indeed" type="checkbox" checked
                  class="w-3.5 h-3.5 rounded accent-blue-500 cursor-pointer flex-shrink-0"
                  onchange="toggleSource('indeed')"/>
                <label for="source-indeed" class="text-xs text-gray-500 dark:text-gray-400 w-14 cursor-pointer select-none">Indeed</label>
                <input id="limit-per-role" type="number" min="10" max="500" step="10" value="100"
                  class="w-20 text-sm text-center bg-white dark:bg-gray-800 border border-gray-200
                         dark:border-gray-600 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1

                <span class="text-xs text-gray-400 dark:text-gray-500" data-i18n="titles.limit_unit"></span>
              </div>
              <!-- LinkedIn row -->
              <div class="flex items-center gap-3">
                <input id="source-linkedin" type="checkbox" checked

                <input id="linkedin-limit-per-role" type="number" min="5" max="200" step="5" value="30"
                  class="w-20 text-sm text-center bg-white dark:bg-gray-800 border border-gray-200
                         dark:border-gray-600 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1
                         focus:ring-blue-400 tabular-nums"/>
                <span class="text-xs text-gray-400 dark:text-gray-500" data-i18n="titles.limit_unit"></span>
              </div>
            </div>
            <p class="text-xs text-amber-500 dark:text-amber-400" data-i18n="titles.linkedin_tip"></p>
          </div>

          <!-- Date range -->
          <div class="flex items-center gap-3">
            <label class="text-sm text-gray-600 dark:text-gray-400 whitespace-nowrap" data-i18n="titles.date_range"></label>
            <select id="hours-old"
              class="flex-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600
                     text-sm rounded-lg px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-400"
              onchange="onHoursOldChange()">
              <option value="24" data-i18n="hours.24h">24h</option>
              <option value="72" selected data-i18n="hours.3d">3 天</option>
              <option value="168" data-i18n="hours.7d">7 天</option>
              <option value="336" data-i18n="hours.14d">14 天</option>
              <option value="720" data-i18n="hours.30d">30 天</option>
              <option value="0" data-i18n="hours.unlimited">不限</option>
            </select>
          </div>

          <!-- Search button -->
          <button id="search-btn" onclick="startSearch()"
            class="w-full py-3 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed
                   text-white font-semibold rounded-xl transition-colors"
            data-i18n="titles.search">
          </button>
        </div>

        <!-- Step 3: Progress -->
        <div id="step-progress" class="space-y-3">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4 animate-spin text-blue-500 flex-shrink-0" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            <span id="progress-title" class="text-sm font-medium text-gray-700 dark:text-gray-300">搜索中…</span>
            <span id="search-timer" class="ml-auto text-xs font-mono text-blue-400 tabular-nums">0:00</span>
          </div>
          <div id="progress-log"
            class="bg-gray-100 dark:bg-gray-800 rounded-xl p-4 text-xs text-gray-500 dark:text-gray-400 space-y-1 font-mono">
          </div>
        </div>

        <!-- Step 4: Done -->
        <div id="step-done" class="hidden text-center space-y-3 py-4">
          <div class="text-4xl">✅</div>
          <p id="done-msg" class="text-sm text-gray-600 dark:text-gray-300 font-medium"></p>

            class="px-5 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors"
            data-i18n="done.restart">
          </button>

    </div><!-- /#search-panel -->

</div><!-- /.flex -->

<!-- ── Log Panel ────────────────────────────────────────────────────────── -->
<div id="log-panel">

      <button data-lvl="ERROR" onclick="setLogLevel(this)"
        class="log-lvl-btn text-xs px-2 py-0.5 rounded border border-slate-700 text-red-400">ERROR</button>
      <button data-lvl="WARNING" onclick="setLogLevel(this)"
        class="log-lvl-btn text-xs px-2 py-0.5 rounded border border-slate-700 text-yellow-400">WARN</button>
      <button data-lvl="INFO" onclick="setLogLevel(this)"
        class="log-lvl-btn text-xs px-2 py-0.5 rounded border border-slate-700 text-slate-400">INFO</button>
    </div>
    <!-- search -->
    <input id="log-search" type="text" data-i18n-ph="log.filter_placeholder"

      <option value="200" selected data-i18n="log.lines_200"></option>
      <option value="500" data-i18n="log.lines_500"></option>
    </select>
    <!-- auto-refresh toggle -->
    <label class="ml-2 flex items-center gap-1 cursor-pointer select-none">
      <input id="log-auto" type="checkbox" checked class="accent-blue-500 w-3 h-3" onchange="toggleLogAuto()"/>
      <span class="text-xs text-slate-400" data-i18n="log.auto_refresh"></span>
    </label>
    <button onclick="fetchLogs()" data-i18n-title="tip.refresh_logs"
      class="ml-1 text-slate-400 hover:text-slate-200 transition-colors">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
    </button>
    <button onclick="clearLogView()" data-i18n-title="tip.clear_log_view"
      class="text-slate-500 hover:text-slate-300 transition-colors text-xs" data-i18n="log.clear"></button>
    <!-- resize handle -->
    <div id="log-resize" class="ml-auto cursor-ns-resize px-2 text-slate-500 hover:text-slate-300 select-none" data-i18n-title="tip.resize_log">⠿</div>
    <!-- close -->
    <button onclick="toggleLogPanel()" class="text-slate-500 hover:text-slate-200 transition-colors" data-i18n-title="tip.close_log">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div id="log-lines"></div>
</div>

let LANG = localStorage.getItem('lang') || 'zh';

function t(key, ...args) {
  let s = (I18N[LANG] || I18N.zh)[key] || (I18N.zh[key] || key);
  args.forEach((v, i) => { s = s.replace(`{${i}}`, v); });
  return s;
}

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPh);
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = t(el.dataset.i18nTitle);
  });
  // lang button highlight
  ['zh','en','es'].forEach(l => {
    const btn = document.getElementById(`lang-${l}`);
    if (btn) btn.className = `lang-btn text-xs px-2 py-0.5 rounded-md transition-colors font-medium ${
      l === LANG ? 'bg-white dark:bg-gray-600 text-blue-600 dark:text-blue-300 shadow-sm'
                 : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'}`;
  });
  document.documentElement.lang = LANG;
}

function setLang(l) {
  LANG = l;
  localStorage.setItem('lang', l);
  applyLang();
  if (typeof renderList === 'function') renderList();
  if (activeJob) showJobDetail(activeJob);
  renderProviderList();
  renderAdzunaStatus();
}

// ─── API helpers ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(err.detail || r.statusText);
  }
  return r.json();
}

async function loadConfig() {
  cfgData = await api("GET", "/api/config");
  renderConfigPage();
  if (cfgData.version) {
    const el = document.getElementById("app-version");
    if (el) el.textContent = `v${cfgData.version}`;
  }
  // Show mock badge and restore-models button if mock mode is on
  if (cfgData.mock_mode) {
    document.getElementById("mock-badge").classList.remove("hidden");
    document.getElementById("restore-models-btn").classList.remove("hidden");
  }
  // Show config page if no provider configured (skip in mock mode)
  if (!cfgData.mock_mode) {
    const anyConfigured = Object.values(cfgData.providers).some(p => p.configured);
    if (!anyConfigured) openConfigPage();
  }
}

const _PROVIDER_LABELS = {
  claude: "Anthropic / Claude", gemini: "Google / Gemini", openai: "OpenAI",
  xai: "xAI / Grok", mistral: "Mistral AI", meta: "Meta / Llama",
  huggingface: "Hugging Face", openrouter: "OpenRouter",
  qwen: "Qwen (通义千问)", glm: "GLM (智谱)", kimi: "Kimi (月之暗面)",
  deepseek: "DeepSeek", minimax: "MiniMax", doubao: "豆包 (字节跳动)",
  siliconflow: "SiliconFlow", ollama: "llama.cpp (本地)", local: "Local OpenAI-compat (本地)",
};
const _PROVIDERS_COLLAPSED_COUNT = 3;
let _providersExpanded = false;

function renderConfigPage() {
  if (!cfgData) return;

  // Populate default provider/model selectors
  const provSel = document.getElementById("cfg-default-provider");
  const modSel  = document.getElementById("cfg-default-model");
  // Remove old change listener by replacing the element clone
  const newProvSel = provSel.cloneNode(false);
  provSel.parentNode.replaceChild(newProvSel, provSel);

  // Placeholder option
  const placeholder = document.createElement("option");
  placeholder.value = "";
  placeholder.textContent = t('cfg.select_provider') || "— Select provider —";
  placeholder.disabled = true;
  if (!cfgData.default_provider) placeholder.selected = true;
  newProvSel.appendChild(placeholder);

  Object.keys(cfgData.available_models).forEach(p => {
    const opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p;
    if (p === cfgData.default_provider) opt.selected = true;
    newProvSel.appendChild(opt);
  });
  populateModelSelect(cfgData.default_provider);
  newProvSel.addEventListener("change", () => populateModelSelect(newProvSel.value));

  // Provider list
  renderProviderList();

  // Adzuna status
  renderAdzunaStatus();
}

function renderProviderList() {
  const container = document.getElementById("cfg-providers");
  container.innerHTML = "";
  const entries = Object.entries(cfgData.providers);
  const visible = _providersExpanded ? entries : entries.slice(0, _PROVIDERS_COLLAPSED_COUNT);
  visible.forEach(([provider, info]) => {
    const div = document.createElement("div");
    div.className = "bg-gray-800 rounded-xl p-4 relative";
    div.innerHTML = `
      <div class="flex items-center justify-between mb-3">
        <span class="font-medium text-sm text-white">${_PROVIDER_LABELS[provider] || provider}</span>
        <span id="status-${provider}" class="text-xs px-2 py-0.5 rounded-full ${info.configured
          ? "bg-green-900/50 text-green-400" : "bg-gray-700 text-gray-500"}">
          ${info.configured ? t('cfg.configured') : t('cfg.unconfigured')}
        </span>
      </div>
      ${info.key_env ? `
      <div class="flex gap-2 items-center">
        <input type="password" id="key-${provider}" placeholder="${info.key_env}"
          class="flex-1 min-w-0 bg-gray-700 border border-gray-600 text-white text-xs rounded-lg px-3 py-2
                 focus:outline-none focus:ring-1 focus:ring-blue-500 placeholder-gray-500"
          autocomplete="off"/>
        <button onclick="saveProviderKey('${provider}', '${info.key_env}')"
          class="flex-shrink-0 px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs rounded-lg transition-colors whitespace-nowrap">
          ${t('cfg.save')}
        </button>
        <button onclick="testProvider('${provider}')"
          class="flex-shrink-0 px-3 py-2 bg-gray-600 hover:bg-gray-500 text-white text-xs rounded-lg transition-colors whitespace-nowrap">
          ${t('cfg.test')}
        </button>
      </div>
      <p id="test-msg-${provider}" class="absolute left-4 right-4 -bottom-4 text-xs truncate text-transparent leading-none"></p>
      ` : `<p class="text-xs text-gray-500">${t('cfg.no_key')}</p>`}
    `;
    container.appendChild(div);
  });

  // Update toggle button
  const toggleBtn   = document.getElementById("cfg-providers-toggle");
  const toggleIcon  = document.getElementById("cfg-providers-toggle-icon");
  const toggleLabel = document.getElementById("cfg-providers-toggle-label");
  if (entries.length <= _PROVIDERS_COLLAPSED_COUNT) {
    toggleBtn.classList.add("hidden");
  } else {
    toggleBtn.classList.remove("hidden");
    const remaining = entries.length - _PROVIDERS_COLLAPSED_COUNT;
    toggleLabel.textContent = _providersExpanded
      ? (t('cfg.collapse') || "Show less")
      : (t('cfg.expand', remaining) || `Show ${remaining} more`);
    toggleIcon.style.transform = _providersExpanded ? "rotate(180deg)" : "";
  }
}

function toggleProviderList() {
  _providersExpanded = !_providersExpanded;
  renderProviderList();
}

function renderAdzunaStatus() {
  if (!cfgData) return;
  const idConfigured  = !!cfgData.providers_extra?.adzuna_id;
  const keyConfigured = !!cfgData.providers_extra?.adzuna_key;
  const both = idConfigured && keyConfigured;
  const el = document.getElementById("status-adzuna");
  if (!el) return;
  el.textContent  = both ? t('cfg.configured') : t('cfg.unconfigured');
  el.className = `text-xs px-2 py-0.5 rounded-full ${both
    ? "bg-green-900/50 text-green-400"
    : "bg-gray-700 text-gray-500"}`;
}

async function saveAdzunaKey() {
  const idVal  = document.getElementById("key-adzuna-id")?.value.trim();
  const keyVal = document.getElementById("key-adzuna-key")?.value.trim();
  const msgEl  = document.getElementById("test-msg-adzuna");
  if (!idVal && !keyVal) return;
  try {
    if (idVal)  await api("POST", "/api/config", { key: "ADZUNA_APP_ID",  value: idVal });
    if (keyVal) await api("POST", "/api/config", { key: "ADZUNA_APP_KEY", value: keyVal });
    if (idVal)  document.getElementById("key-adzuna-id").value  = "";
    if (keyVal) document.getElementById("key-adzuna-key").value = "";
    if (!cfgData.providers_extra) cfgData.providers_extra = {};
    if (idVal)  cfgData.providers_extra.adzuna_id  = true;
    if (keyVal) cfgData.providers_extra.adzuna_key = true;
    renderAdzunaStatus();
    if (msgEl) { msgEl.textContent = t('cfg.saved_ok') || "Saved"; msgEl.className = "absolute left-4 right-4 -bottom-4 z-10 text-xs truncate leading-none text-green-400"; }
  } catch(e) {
    if (msgEl) { msgEl.textContent = e.message; msgEl.className = "absolute left-4 right-4 -bottom-4 z-10 text-xs truncate leading-none text-red-400"; }
  }
}

function populateModelSelect(provider) {
  const modSel  = document.getElementById("cfg-default-model");
  const saveBtn = document.getElementById("cfg-save-default-btn");
  if (!modSel || !cfgData) return;

  if (!provider) {
    modSel.innerHTML = `<option value="" disabled selected>${t('cfg.select_provider_first') || "— Select provider first —"}</option>`;
    if (saveBtn) { saveBtn.disabled = true; saveBtn.classList.add("opacity-50", "cursor-not-allowed"); }
    return;
  }

  const models = cfgData.available_models[provider] || [];
  if (models.length === 0) {
    // Local / unconfigured provider: use DEFAULT_MODELS fallback as the only option
    const fallback = (cfgData.default_models || {})[provider] || "";
    modSel.innerHTML = fallback
      ? `<option value="${fallback}" selected>${fallback}</option>`
      : `<option value="" disabled selected>${t('cfg.select_provider_first') || "— No models available —"}</option>`;
  } else {
    modSel.innerHTML = models.map(m =>
      `<option value="${m}" ${m === cfgData.default_model && provider === cfgData.default_provider ? "selected" : ""}>${m}</option>`
    ).join("");
  }

  // Enable save only when provider is selected and model select has a real value
  const hasModel = modSel.value && !modSel.options[modSel.selectedIndex]?.disabled;
  if (saveBtn) {
    saveBtn.disabled = !hasModel;
    saveBtn.classList.toggle("opacity-50",          !hasModel);
    saveBtn.classList.toggle("cursor-not-allowed",  !hasModel);
  }
}

async function saveProviderKey(provider, keyEnv) {
  const input = document.getElementById(`key-${provider}`);
  const val = input.value.trim();
  if (!val) return;
  await api("POST", "/api/config", { key: keyEnv, value: val });
  input.value = "";
  const statusEl = document.getElementById(`status-${provider}`);
  statusEl.textContent = t('cfg.configured');
  statusEl.className = "text-xs px-2 py-0.5 rounded-full bg-green-900/50 text-green-400";
}

async function testProvider(provider) {
  const msgEl = document.getElementById(`test-msg-${provider}`);
  const _cls = ok => `absolute left-4 right-4 -bottom-4 z-10 text-xs truncate leading-none ${ok ? "text-green-400" : "text-red-400"}`;
  msgEl.className = "absolute left-4 right-4 -bottom-4 z-10 text-xs truncate leading-none text-gray-400";
  msgEl.textContent = t('msg.testing');
  try {
    const r = await api("POST", "/api/config/test", { provider });
    msgEl.textContent = r.ok
      ? t('cfg.test_ok', provider, r.model || "")
      : r.message;
    msgEl.className = _cls(r.ok);
  } catch(e) {
    msgEl.textContent = e.message;
    msgEl.className = _cls(false);
  }
}

async function saveDefaultModel() {
  const provider = document.getElementById("cfg-default-provider").value;
  const modSel   = document.getElementById("cfg-default-model");
  const model    = modSel?.value;
  if (!provider || !model || modSel?.options[modSel.selectedIndex]?.disabled) return;
  await api("POST", "/api/config", { key: "DEFAULT_PROVIDER", value: provider });
  await api("POST", "/api/config", { key: "DEFAULT_MODEL", value: model });
  cfgData.default_provider = provider;
  cfgData.default_model = model;
  showToast(`${t('msg.model_saved')}${provider} / ${model}`);
}

function _fmtElapsed(sec) {
  const m = Math.floor(sec / 60), s = Math.round(sec % 60);
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}
function _fmtNum(n) { return (n || 0).toLocaleString(); }

function updateSessionTokens(tokIn, tokOut) {
  _sessionTokensIn  += tokIn  || 0;
  _sessionTokensOut += tokOut || 0;
  _sessionSearches  += 1;
  const el = document.getElementById("session-tokens");
  el.classList.remove("hidden");
  el.textContent = `🪙 ${_fmtNum(_sessionTokensIn + _sessionTokensOut)} tokens (×${_sessionSearches})`;
  el.title = t('tip.session_tokens_detail', _fmtNum(_sessionTokensIn), _fmtNum(_sessionTokensOut));
}

function _renderFunnelRow(f, rid) {
  if (!f) return "";
  const steps = [
    { label: t('funnel.scraped'),   value: `Indeed ${f.scraped_indeed} + LinkedIn ${f.scraped_linkedin} = ${f.scraped_total}`, color: "text-blue-300" },
    { label: t('funnel.title'),     value: f.title_filter_in ? `${f.title_filter_in} → ${t('funnel.passed')} ${f.title_filter_passed}  ${t('funnel.out')} ${f.title_filter_out}  (${f.llm_title_pass_rate}%)` : "—", color: "text-purple-300" },
    { label: t('funnel.prefilter'), value: (() => {
        const parts = [];
        if (f.skip_dup)        parts.push(`${t('funnel.skip_dup')} ${f.skip_dup}`);
        if (f.skip_seniority)  parts.push(`${t('funnel.skip_seniority')} ${f.skip_seniority}`);
        if (f.skip_irrelevant) parts.push(`${t('funnel.skip_irrelevant')} ${f.skip_irrelevant}`);
        if (f.cache_hit)       parts.push(`${t('funnel.skip_cache')} ${f.cache_hit}`);
        if (f.skip_no_desc)    parts.push(`${t('funnel.skip_no_desc')} ${f.skip_no_desc}`);
        if (f.skip_closed)     parts.push(`${t('funnel.skip_closed')} ${f.skip_closed}`);
        if (f.skip_exp)        parts.push(`${t('funnel.skip_exp')} ${f.skip_exp}`);
        if (f.skip_skill)      parts.push(`${t('funnel.skip_skill')} ${f.skip_skill}`);
        return (parts.length ? parts.join(" | ") : t('funnel.no_filter')) + `  (${t('funnel.entered')} ${f.prefilter_in})`;
      })(), color: "text-yellow-300" },
    { label: t('funnel.llm'),       value: f.llm_assessed ? `${t('funnel.sent')} ${f.llm_assessed}  ${t('funnel.rejected')} ${f.llm_rejected}  ${t('funnel.pass_rate')} ${f.llm_pass_rate}%` : "—", color: "text-orange-300" },
    { label: t('funnel.saved'),     value: `${f.saved} / ${f.scraped_total}  ${t('funnel.filter_rate_label')} ${f.filter_rate}%`, color: "text-green-400 font-semibold" },
  ];
  const tableRows = steps.map(s =>
    `<tr class="border-t border-gray-700/40">
      <td class="py-1 pr-6 text-gray-500 whitespace-nowrap">${s.label}</td>
      <td class="py-1 ${s.color} font-mono">${s.value}</td>
    </tr>`
  ).join("");

  let srcHtml = "";
  if (f.by_source && Object.keys(f.by_source).length > 1) {
    const srcRows = Object.entries(f.by_source).map(([src, st]) =>
      `<tr class="border-t border-gray-700/30">
        <td class="py-0.5 pr-6 text-gray-600">${_esc(src)}</td>
        <td class="py-0.5 text-gray-400 font-mono">${t('funnel.src_in')} ${st.in || 0}  ${t('funnel.src_saved')} ${st.saved || 0}</td>
      </tr>`
    ).join("");
    srcHtml = `<p class="text-gray-500 text-xs mt-2 mb-1">${t('funnel.by_source')}</p><table class="text-xs w-full">${srcRows}</table>`;
  }

  return `<tr id="funnel-row-${rid}" class="hidden bg-gray-900/60">
    <td colspan="8" class="px-8 py-3">
      <table class="text-xs w-full">${tableRows}</table>
      ${srcHtml}
    </td>
  </tr>`;
}

function _esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function _toggleFunnel(rid) {
  const row = document.getElementById("funnel-row-" + rid);
  if (row) row.classList.toggle("hidden");
}

function renderHistoryTable(records) {
  const tbody = document.getElementById("hist-tbody");
  const empty = document.getElementById("hist-empty");
  if (!records || records.length === 0) {
    tbody.innerHTML = "";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");
  tbody.innerHTML = records.map(r => {
    const dt = new Date(r.created_at + "Z").toLocaleString();
    const roles = (r.roles || []).join(", ") || "—";
    const model = r.model ? `${r.provider}/${r.model.split("-").slice(-2).join("-")}` : r.provider;
    const funnelBtn = r.funnel
      ? `<button onclick="_toggleFunnel(${r.id})" title="${t('funnel.toggle')}"
           class="text-xs px-2 py-0.5 rounded bg-indigo-900/50 hover:bg-indigo-700/60 text-indigo-300 hover:text-white transition-colors border border-indigo-700/40">
           📊
         </button>`
      : `<span class="text-gray-600 text-xs">—</span>`;
    const mainRow = `<tr class="hover:bg-gray-700/30 transition-colors">
      <td class="px-4 py-2.5 text-gray-400 whitespace-nowrap">${dt}</td>
      <td class="px-4 py-2.5"><span class="text-white">${roles}</span><br>
        <span class="text-gray-500 text-xs">${r.location}</span></td>
      <td class="px-4 py-2.5 text-gray-400">${model}</td>
      <td class="px-4 py-2.5 text-right text-yellow-300">${_fmtElapsed(r.elapsed)}</td>
      <td class="px-4 py-2.5 text-right text-green-300">${_fmtNum(r.tokens_in)}</td>
      <td class="px-4 py-2.5 text-right text-blue-300">${_fmtNum(r.tokens_out)}</td>
      <td class="px-4 py-2.5 text-right text-white font-semibold">${r.jobs_found}</td>
      <td class="px-4 py-2.5 text-right">${funnelBtn}</td>
    </tr>`;
    return mainRow + _renderFunnelRow(r.funnel, r.id);
  }).join("");
}

async function refreshModels() {
  const btn  = document.getElementById("refresh-models-btn");
  const icon = document.getElementById("refresh-models-icon");
  btn.disabled = true;
  icon.classList.add("animate-spin");
  try {
    const res = await api("POST", "/api/models/refresh");
    const count = Object.keys(res.updated || {}).length;
    if (count === 0) {
      showToast(t('cfg.refresh_models_none'), true);
    } else {
      // 更新内存中的模型列表并重新渲染下拉框
      Object.assign(cfgData.available_models, res.updated);
      populateModelSelect(cfgData.default_provider);
      showToast(t('cfg.refresh_models_ok', count));
    }
  } catch(e) {
    showToast(`${t('cfg.refresh_models')}: ${e.message}`, true);
  } finally {
    btn.disabled = false;
    icon.classList.remove("animate-spin");
  }
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, isError = false) {
  const el = document.createElement("div");
  el.className = `fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-3
    px-5 py-3 rounded-xl text-sm text-white shadow-xl
    transition-opacity duration-300
    ${isError ? "bg-red-600" : "bg-green-600"}`;
  el.innerHTML = `<span class="flex-1">${msg}</span>
    <button onclick="this.closest('div').remove()"
      class="ml-2 text-white/70 hover:text-white transition-colors text-base leading-none">✕</button>`;
  document.body.appendChild(el);
  const timer = setTimeout(() => {
    el.style.opacity = "0";
    setTimeout(() => el.remove(), 300);
  }, 5000);
  el.querySelector("button").addEventListener("click", () => clearTimeout(timer));
}

// ─── Job list rendering ───────────────────────────────────────────────────────
function scoreColor(s) {
  if (s === null || s === undefined) return "bg-gray-400";
  if (s >= 8) return "bg-green-500";
  if (s >= 6) return "bg-yellow-400";
  if (s >= 4) return "bg-orange-400";
  return "bg-red-400";
}
function scoreBadge(s) {
  const display = s !== null && s !== undefined ? s : "?";
  return `<span class="inline-flex items-center justify-center w-8 h-8 rounded-full text-white text-sm font-bold flex-shrink-0 ${scoreColor(s)}">${display}</span>`;
}

function dotClass(on, color) {
  return `w-2.5 h-2.5 rounded-full transition-colors duration-200 ${on ? color : "bg-gray-300 dark:bg-gray-600"}`;
}

function renderDots(key) {
  const s = STATUS[key] || { read: false, applied: false, replied: false };
  function row(dot, color, onLabel, offLabel, active) {
    return `
      <div class="flex items-center gap-1.5">
        <span data-dot="${dot}" data-key="${key}" class="${dotClass(active, color)} cursor-pointer hover:opacity-75"></span>
        <span data-label="${dot}" data-key="${key}"
          class="text-xs cursor-pointer hover:underline w-20 truncate ${active ? "text-gray-600 dark:text-gray-300" : "text-gray-400 dark:text-gray-500"}">
          ${active ? onLabel : offLabel}
        </span>
      </div>`;
  }
  return `
    <div class="flex flex-col gap-1.5 ml-2">
      ${row("read",    "bg-blue-500",   t('dot.read_on'),    t('dot.read_off'),    s.read)}
      ${row("applied", "bg-green-500",  t('dot.applied_on'), t('dot.applied_off'), s.applied)}
      ${row("replied", "bg-yellow-400", t('dot.replied_on'), t('dot.replied_off'), s.replied)}
    </div>`;
}

function jobMatchesFilters(job) {
  if (searchText) {
    const q = searchText.toLowerCase();
    if (!job.title.toLowerCase().includes(q) && !job.company.toLowerCase().includes(q)) return false;
  }
  if (dateRange !== "all") {
    const posted = new Date(job.fetched_at);
    const diffMs = Date.now() - posted;
    if (dateRange === "today" && diffMs > 86400000)   return false;
    if (dateRange === "week"  && diffMs > 7*86400000) return false;
  }
  if (scoreMin !== null) {
    const s = job.score ?? -1;
    if (s < scoreMin) return false;
  }
  return true;
}

function sortedJobs() {
  return [...JOBS].filter(jobMatchesFilters).sort((a, b) =>
    sortMode === "score"
      ? (b.score ?? -1) - (a.score ?? -1)
      : (new Date(b.date_posted || b.fetched_at) - new Date(a.date_posted || a.fetched_at))
  );
}

const listEl    = document.getElementById("list");
const summaryEl = document.getElementById("summary");

function buildCard(job) {
  const key = job.dedup_key;
  if (!STATUS[key]) STATUS[key] = { read: false, applied: false, replied: false };
  const card = document.createElement("div");
  card.className = "job-card px-4 py-3 cursor-pointer hover:bg-blue-50 dark:hover:bg-gray-700/60 transition-colors";
  card.dataset.key = key;
  const isRemote = (job.location || "").toLowerCase().includes("remote");
  const dateStr = (() => {
    if (job.date_posted) {
      const d = new Date(job.date_posted);
      if (!isNaN(d)) {
        const days = Math.floor((Date.now() - d) / 86400000);
        if (days === 0) return LANG === 'zh' ? '今天' : 'Today';
        if (days === 1) return LANG === 'zh' ? '昨天' : 'Yesterday';
        return LANG === 'zh' ? `${days} 天前` : `${days}d ago`;
      }
    }
    return job.fetched_at ? new Date(job.fetched_at).toLocaleDateString("zh-CN") : "";
  })();
  const isNew = _newThisSearch.size > 0
    ? _newThisSearch.has(key)
    : job.fetched_at && (Date.now() - new Date(job.fetched_at).getTime() < 86400000);
  card.innerHTML = `
    <div class="flex items-center gap-3">
      ${deleteMode ? `<input type="checkbox" data-key="${key}"
        class="self-center w-3.5 h-3.5 rounded accent-blue-500 cursor-pointer flex-shrink-0"
        ${selectedKeys.has(key) ? "checked" : ""}/>` : ""}
      ${scoreBadge(job.score)}
      <div class="flex-1 min-w-0">
        <div class="font-medium text-sm truncate text-gray-800 dark:text-gray-100">${job.title}</div>
        <div class="flex items-center gap-1.5">
          <span class="text-xs text-gray-500 dark:text-gray-400 truncate">${job.company}</span>
          ${isNew ? '<span class="flex-shrink-0 text-[10px] font-semibold px-1 py-0.5 bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-400 rounded">NEW</span>' : ""}
        </div>
        <div class="flex items-center gap-2 mt-1">
          <span class="text-xs text-gray-400 dark:text-gray-500">${dateStr}</span>
          ${(job.raw_sources || job.sources || []).map(rs => {
            const s = rs.source || rs;
            const url = rs.url || job.url;
            const isLinkedIn = s.includes("linkedin");
            const isIndeed   = s.includes("indeed");
            const cls = isLinkedIn
              ? "bg-blue-600/10 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 hover:opacity-70"
              : isIndeed
              ? "bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 hover:opacity-70"
              : "bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 hover:opacity-70";
            const label = isLinkedIn ? "LinkedIn" : isIndeed ? "Indeed" : s;
            return `<a href="${url}" target="_blank" rel="noopener"
              class="text-[10px] px-1.5 py-0.5 rounded font-medium ${cls} transition-opacity"
              onclick="event.stopPropagation()">${label}</a>`;
          }).join("")}
          ${isRemote ? '<span class="text-xs bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-300 px-1.5 py-0.5 rounded">Remote</span>' : ""}
        </div>
      </div>
      <div class="self-center">${renderDots(key)}</div>
    </div>`;

  card.addEventListener("click", e => {
    // Dot toggle (read / applied / replied)
    const dotEl = e.target.closest('[data-dot], [data-label]');
    if (dotEl) {
      e.stopPropagation();
      const dot = dotEl.dataset.dot || dotEl.dataset.label;
      STATUS[key][dot] = !STATUS[key][dot];
      renderList();
      return;
    }
    if (e.target.closest("input[type='checkbox']")) return;
    if (deleteMode) { toggleSelect(key); return; }
    STATUS[key].read = true;
    showJobDetail(job);
    renderList();
  });
  return card;
}

function renderList() {
  const jobs = sortedJobs();
  listEl.innerHTML = "";
  if (jobs.length === 0) {
    const msg = isLoading ? t('list.loading') : t('list.empty');
    listEl.innerHTML = `<div class="flex flex-col items-center justify-center py-12 text-gray-400">
      <p class="text-sm">${msg}</p>
    </div>`;
  } else {
    jobs.forEach(job => listEl.appendChild(buildCard(job)));
  }
  summaryEl.textContent = jobs.length !== JOBS.length
    ? t('summary.showing', jobs.length, JOBS.length)
    : t('summary.total', JOBS.length);
  if (activeKey) {
    const c = listEl.querySelector(`[data-key="${activeKey}"]`);
    if (c) c.classList.add("bg-blue-50", "dark:bg-gray-700", "border-l-4", "border-blue-500");
  }
}

async function loadJobs() {
  try {
    JOBS = await api("GET", "/api/jobs");
  } catch(e) {
    listEl.innerHTML = `<div class="text-xs text-center py-4 text-red-400">${e.message}</div>`;
    return;
  } finally {
    isLoading = false;
  }
  renderList();
}

    btn.classList.remove("border-blue-400", "text-blue-500", "dark:text-blue-400");

    o.classList.toggle("font-semibold", active);

function toggleScoreDropdown() {

function setScoreFilter(v) {
