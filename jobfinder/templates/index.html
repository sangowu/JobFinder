// ─── CV upload & search ───────────────────────────────────────────────────────
function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add("drag-over"); }
function handleDragLeave(e) { e.currentTarget.classList.remove("drag-over"); }
function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  const file = e.dataTransfer.files[0];
  if (file) handleFileSelect(file);
}

async function handleFileSelect(file) {
  if (!file) return;
  const uploadEl = document.getElementById("step-upload");
  const statusEl = document.getElementById("parse-status");
  statusEl.classList.remove("hidden");

  const provider = cfgData?.default_provider || "gemini";
  const model    = cfgData?.default_model    || "";

  const fd = new FormData();
  fd.append("file", file);
  fd.append("provider", provider);
  fd.append("model", model);

  try {
    const r = await fetch("/api/cv/parse", { method: "POST", body: fd });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
    const data = await r.json();
    cvHash   = data.cv_hash;
    cvProfile = data.profile;
    localStorage.setItem("cv_hash", cvHash);
    localStorage.setItem("cv_profile", JSON.stringify(cvProfile));
    localStorage.removeItem("titles_list");
    statusEl.classList.add("hidden");
    showTitlesStep();
  } catch(e) {
    statusEl.classList.add("hidden");
    showToast(`${t('msg.parse_fail')}${e.message}`, true);
  }
}

function showTitlesStep() {
  document.getElementById("step-titles").classList.remove("hidden");

  // Fill profile card
  document.getElementById("prof-name").textContent    = cvProfile.name || "—";
  document.getElementById("prof-summary").textContent = cvProfile.summary || "";
  document.getElementById("prof-seniority").textContent = cvProfile.seniority || "";

  // Skills tags
  const skillsEl = document.querySelector("#profile-card .flex.flex-wrap");
  skillsEl.innerHTML = (cvProfile.skills || []).slice(0, 12).map(s =>
    `<span class="px-2 py-0.5 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded-full text-xs">${s}</span>`
  ).join("");

  // Preferred location
  const loc = (cvProfile.preferred_locations || [])[0] || "";
  const locSel = document.getElementById("location-select");
  if (loc) {
    const lower = loc.toLowerCase();
    for (const opt of locSel.options) {
      if (lower.includes(opt.value)) { opt.selected = true; break; }
    }
  }

  // Titles — 仅在列表为空时用 profile 默认值初始化，避免覆盖 localStorage 恢复的数据
  if (titlesList.length === 0) {
    titlesList = [...(cvProfile.preferred_roles || [])];
  }
  renderTitles();

  // 有 CV 时隐藏上传区
  document.getElementById("step-upload").style.display = "none";
}

function renderTitles() {
  const el = document.getElementById("titles-list");
  el.innerHTML = titlesList.map((t, i) => `
    <div class="flex items-center gap-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700
                rounded-lg px-3 py-2">
      <span class="flex-1 text-sm text-gray-700 dark:text-gray-300">${t}</span>
      <button onclick="removeTitle(${i})"
        class="text-gray-400 hover:text-red-500 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>`).join("");
  localStorage.setItem("titles_list", JSON.stringify(titlesList));
}

function addTitle() {
  const input = document.getElementById("add-title-input");
  const val = input.value.trim();
  if (val && !titlesList.includes(val)) { titlesList.push(val); renderTitles(); }
  input.value = "";
}

function removeTitle(i) { titlesList.splice(i, 1); renderTitles(); }

async function discoverTitles() {
  if (!cvHash) return;
  const btn      = document.getElementById("discover-btn");
  const btnSpan  = btn.querySelector('[data-i18n]');
  const progress = document.getElementById("discover-progress");
  if (btnSpan) btnSpan.textContent = t('msg.discovering');
  btn.disabled = true;
  progress.classList.remove("hidden");
  const provider = cfgData?.default_provider || "gemini";
  const model    = cfgData?.default_model    || "";
  try {
    const r = await api("POST", "/api/titles/discover", { cv_hash: cvHash, provider, model, profile: cvProfile });
    const discovered = (r.titles || []).map(t => t.canonical || t.name || t);
    const added = discovered.filter(t => !titlesList.includes(t));
    added.forEach(t => titlesList.push(t));
    renderTitles();
    showToast(t('msg.discover_done', added.length));
  } catch(e) {
    showToast(`${t('msg.discover_fail')}${e.message}`, true);
  } finally {
    progress.classList.add("hidden");
    if (btnSpan) btnSpan.textContent = t('titles.discover');
    btn.disabled = false;
  }
}

async function startSearch() {
  if (!cvHash || titlesList.length === 0) {
    showToast(t('msg.search_require'), true);
    return;
  }
  const location      = document.getElementById("location-select").value;
  const provider      = cfgData?.default_provider || "gemini";
  const model         = cfgData?.default_model    || "";
  const indeedEnabled        = document.getElementById("source-indeed").checked;
  const linkedinEnabled      = document.getElementById("source-linkedin").checked;
  if (!indeedEnabled && !linkedinEnabled) {
    showToast(t('msg.source_required'), true);
    return;
  }
  const limitPerRole         = indeedEnabled  ? Math.min(500, Math.max(10,  parseInt(document.getElementById("limit-per-role").value)         || 200)) : 0;
  const linkedinLimitPerRole = linkedinEnabled ? Math.min(200, Math.max(5,   parseInt(document.getElementById("linkedin-limit-per-role").value) || 30))  : 0;
  const hoursOldVal = parseInt(document.getElementById("hours-old").value);
  const hoursOld    = hoursOldVal > 0 ? hoursOldVal : null;

  // Switch to progress view
  document.getElementById("step-titles").classList.add("hidden");
  document.getElementById("step-upload").style.display = "none";
  document.getElementById("step-progress").classList.add("active");
  document.getElementById("step-done").classList.add("hidden");
  document.getElementById("done-stats").classList.add("hidden");
  document.getElementById("done-funnel").classList.add("hidden");
  document.getElementById("done-dedup").classList.add("hidden");
  document.getElementById("progress-log").innerHTML = "";
  document.getElementById("progress-title").textContent = t('progress.title');
  startSearchTimer();
  // 搜索前快照已有 key，用于后续区分新旧
  _prevSearchKeys = new Set(JOBS.map(j => j.dedup_key));
  _newThisSearch  = new Set();
  // 清空旧列表，本次搜索结果会通过 SSE job 事件逐条填入
  JOBS = [];
  activeKey = null;
  renderList();

  try {
    await api("POST", "/api/search", { cv_hash: cvHash, roles: titlesList, location, provider, model, language: LANG, limit_per_role: limitPerRole, linkedin_limit_per_role: linkedinLimitPerRole, hours_old: hoursOld });
    listenProgress();
  } catch(e) {
    document.getElementById("step-progress").classList.remove("active");
    document.getElementById("step-titles").classList.remove("hidden");
    showToast(`${t('msg.search_fail_start')}${e.message}`, true);
  }
}

let _timerInterval = null;
let _timerStart    = null;

function startSearchTimer() {
  stopSearchTimer();
  _timerStart = Date.now();
  const el = document.getElementById("search-timer");
  _timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - _timerStart) / 1000);
    const m = Math.floor(s / 60);
    el.textContent = `${m}:${String(s % 60).padStart(2, "0")}`;
  }, 1000);
}

function stopSearchTimer() {
  if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
}

function listenProgress() {
  const log = document.getElementById("progress-log");
  const es = new EventSource("/api/search/progress");
  let finished = false;  // done/error 收到后标记，避免 onerror 误触发

  es.onmessage = e => {
    const data = JSON.parse(e.data);

    if (data.type === "progress") {
      const p = document.createElement("p");
      p.textContent = data.msg;
      log.appendChild(p);
      log.scrollTop = log.scrollHeight;

    } else if (data.type === "job") {
      const job = data.job;
      const existing = JOBS.findIndex(j => j.dedup_key === job.dedup_key);
      if (existing >= 0) JOBS[existing] = job;
      else JOBS.push(job);
      if (!_prevSearchKeys.has(job.dedup_key)) _newThisSearch.add(job.dedup_key);
      renderList();
      const p = document.createElement("p");
      const score = job.score !== null ? ` [${job.score}分]` : "";
      p.textContent = `✓ ${job.title} @ ${job.company}${score}`;
      p.style.color = "#4ade80";
      log.appendChild(p);
      log.scrollTop = log.scrollHeight;

    } else if (data.type === "done") {
      finished = true;
      stopSearchTimer();
      es.close();
      document.getElementById("step-progress").classList.remove("active");
      document.getElementById("step-done").classList.remove("hidden");
      const newCount   = _newThisSearch.size;
      const cacheCount = data.count - newCount;
      document.getElementById("done-msg").textContent =
        _prevSearchKeys.size > 0
          ? t('msg.search_done_diff', newCount, cacheCount)
          : t('msg.search_done', data.count);

      // 耗时 + token 汇总
      if (data.elapsed != null) {
        const m = Math.floor(data.elapsed / 60);
        const s = Math.round(data.elapsed % 60);
        const timeStr = m > 0 ? `${m}m ${s}s` : `${s}s`;
        document.getElementById("done-elapsed").textContent = t('done.elapsed', timeStr);
        const tokIn  = (data.tokens_in  || 0).toLocaleString();
        const tokOut = (data.tokens_out || 0).toLocaleString();
        document.getElementById("done-tokens").textContent = t('done.tokens', tokIn, tokOut);
        document.getElementById("done-stats").classList.remove("hidden");
        updateSessionTokens(data.tokens_in || 0, data.tokens_out || 0);
      }

      // 搜索管道统计：写入进度日志 + 完成卡片
      if (data.pipeline_stats) {
        const f = data.pipeline_stats;
        const log = document.getElementById("progress-log");

        // 进度日志追加漏斗摘要
        const lines = [
          t('funnel.header'),
          `${t('funnel.scraped')}  Indeed ${f.scraped_indeed} + LinkedIn ${f.scraped_linkedin} = ${f.scraped_total} (${t('funnel.merged')})`,
          f.title_filter_in
            ? `${t('funnel.title')}  ${f.title_filter_in} → ${t('funnel.passed')} ${f.title_filter_passed}  ${t('funnel.out')} ${f.title_filter_out} (${f.llm_title_pass_rate}%)`
            : null,
          (() => {
            const parts = [];
            if (f.skip_dup)        parts.push(`${t('funnel.skip_dup')} ${f.skip_dup}`);
            if (f.skip_seniority)  parts.push(`${t('funnel.skip_seniority')} ${f.skip_seniority}`);
            if (f.skip_irrelevant) parts.push(`${t('funnel.skip_irrelevant')} ${f.skip_irrelevant}`);
            if (f.cache_hit)       parts.push(`${t('funnel.skip_cache')} ${f.cache_hit}`);
            if (f.skip_no_desc)    parts.push(`${t('funnel.skip_no_desc')} ${f.skip_no_desc}`);
            if (f.skip_closed)     parts.push(`${t('funnel.skip_closed')} ${f.skip_closed}`);
            if (f.skip_exp)        parts.push(`${t('funnel.skip_exp')} ${f.skip_exp}`);
            if (f.skip_skill)      parts.push(`${t('funnel.skip_skill')} ${f.skip_skill}`);
            return `${t('funnel.prefilter')}  ${f.prefilter_in} ${t('funnel.entered')}` + (parts.length ? `  (${parts.join(' | ')})` : '');
          })(),
          f.llm_assessed
            ? `${t('funnel.llm')}  ${t('funnel.sent')} ${f.llm_assessed}  ${t('funnel.rejected')} ${f.llm_rejected}  ${t('funnel.pass_rate')} ${f.llm_pass_rate}%`
            : null,
          `✦ ${t('funnel.saved')}  ${f.saved} / ${f.scraped_total}  ${t('funnel.filter_rate_label')} ${f.filter_rate}%`,
        ].filter(Boolean);

        lines.forEach(text => {
          const p = document.createElement("p");
          p.textContent = text;
          p.style.color = text.startsWith("✦") ? "#4ade80"
            : text.startsWith("━") ? "#94a3b8"
            : "#64748b";
          p.style.fontFamily = "monospace";
          p.style.fontSize = "0.75rem";
          log.appendChild(p);
        });
        log.scrollTop = log.scrollHeight;

        // 完成卡片：漏斗迷你表
        const funnelEl = document.getElementById("done-funnel");
        if (funnelEl) {
          funnelEl.innerHTML = `
            <div class="text-xs font-mono text-left space-y-0.5 mt-2 pt-2 border-t border-gray-600/50">
              <p class="text-gray-500">Indeed <span class="text-blue-300">${f.scraped_indeed}</span>  LinkedIn <span class="text-blue-300">${f.scraped_linkedin}</span>  ${t('funnel.merged')} <span class="text-blue-300">${f.scraped_total}</span></p>
              ${f.title_filter_in ? `<p class="text-gray-500">${t('funnel.title')} ${t('funnel.out')} <span class="text-purple-300">${f.title_filter_out}</span></p>` : ''}
              <p class="text-gray-500">${t('funnel.llm')} ${t('funnel.rejected')} <span class="text-orange-300">${f.llm_rejected}</span></p>
              <p class="text-gray-400">${t('funnel.filter_rate_label')} <span class="text-green-400 font-semibold">${f.filter_rate}%</span></p>
            </div>`;
          funnelEl.classList.remove("hidden");
        }
      }

      // 去重验证报告
      if (data.dedup != null) {
        const d = data.dedup;
        const dedupEl = document.getElementById("done-dedup");
        if (dedupEl) {
          const allPass = d.l1 === 0 && d.l2 === 0;
          const statusColor = allPass ? "#4ade80" : "#fb923c";
          const statusText  = allPass ? t('dedup.pass') : t('dedup.warn');
          let html = `<div class="mt-2 pt-2 border-t border-gray-600/50 text-left space-y-0.5">
            <p style="color:#94a3b8">${t('dedup.header')} <span style="color:${statusColor};font-weight:600">${statusText}</span></p>
            <p style="color:#64748b">L1 ${t('dedup.exact')} <span style="color:${d.l1 ? '#fb923c' : '#4ade80'}">${d.l1}</span> &nbsp; L2 ${t('dedup.url')} <span style="color:${d.l2 ? '#fb923c' : '#4ade80'}">${d.l2}</span></p>`;
          if (d.l2_items && d.l2_items.length > 0) {
            d.l2_items.slice(0, 3).forEach(item => {
              html += `<p style="color:#475569;padding-left:8px">${item.url.slice(0, 60)}${item.url.length > 60 ? '...' : ''}</p>`;
              item.dedup_keys.forEach(k => { html += `<p style="color:#374151;padding-left:16px">-> ${k}</p>`; });
            });
            if (d.l2_items.length > 3) html += `<p style="color:#475569;padding-left:8px">... +${d.l2_items.length - 3} more</p>`;
          }
          html += `</div>`;
          dedupEl.innerHTML = html;
          dedupEl.classList.remove("hidden");
        }
      }

      JOBS.sort((a, b) => ((b.score ?? -1) - (a.score ?? -1)));
      renderList();

    } else if (data.type === "error") {
      finished = true;
      stopSearchTimer();
      es.close();
      document.getElementById("step-progress").classList.remove("active");
      document.getElementById("step-titles").classList.remove("hidden");
      document.getElementById("step-upload").style.display = "";
      showToast(`${t('msg.search_fail')}${data.msg}`, true);

    }
    // "timeout" 和 keepalive 注释行不触发 onmessage，忽略即可
  };

  es.onerror = () => {
    if (finished) return;   // done/error 已处理，连接正常关闭，忽略
    stopSearchTimer();
    es.close();
    // 搜索仍在进行但连接意外断开：给用户选择
    document.getElementById("step-progress").classList.remove("active");
    document.getElementById("step-titles").classList.remove("hidden");
    document.getElementById("step-upload").style.display = "";
    showToast(t('msg.sse_disconnect'), true);
  };
}

function resetSearchPanel() {
  document.getElementById("step-done").classList.add("hidden");
  document.getElementById("step-progress").classList.remove("active");
  if (cvHash && cvProfile) {
    // 保留 CV 状态，回到 Step 2 继续搜索
    document.getElementById("step-titles").classList.remove("hidden");
    document.getElementById("step-upload").style.display = "none";
  } else {
    document.getElementById("step-titles").classList.add("hidden");
    document.getElementById("step-upload").style.display = "";
  }
}

function onHoursOldChange() {
  const val = parseInt(document.getElementById("hours-old").value);
  const sel = document.getElementById("sort-select");
  if (val === 0) {
    sortMode = "date";
    if (sel) sel.value = "date";
  } else {
    sortMode = "score";
    if (sel) sel.value = "score";
  }
  renderList();
}

function toggleSource(source) {
  const inputId = source === "indeed" ? "limit-per-role" : "linkedin-limit-per-role";
  const checked = document.getElementById(`source-${source}`).checked;
  const input   = document.getElementById(inputId);
  input.disabled = !checked;
  input.classList.toggle("opacity-40", !checked);
}

function swapCV() {
  // 清除 CV 状态，显示上传区，保留已有职位列表不受影响
  cvHash = null;
  cvProfile = null;
  titlesList = [];
  localStorage.removeItem("cv_hash");
  localStorage.removeItem("cv_profile");
  localStorage.removeItem("titles_list");
  document.getElementById("step-titles").classList.add("hidden");
  document.getElementById("step-done").classList.add("hidden");
  document.getElementById("step-progress").classList.remove("active");
  document.getElementById("step-upload").style.display = "";
  document.getElementById("cv-file-input").value = "";
}

function clearSearchState() {
  cvHash = null;
  cvProfile = null;
  titlesList = [];
  localStorage.removeItem("cv_hash");
  localStorage.removeItem("cv_profile");
  localStorage.removeItem("titles_list");
  document.getElementById("step-done").classList.add("hidden");
  document.getElementById("step-progress").classList.remove("active");
  document.getElementById("step-titles").classList.add("hidden");
  document.getElementById("step-upload").style.display = "";
  document.getElementById("cv-file-input").value = "";
}

// ─── Collapse back to two-panel (full-width search panel) ─────────────────────
function toggleApplyDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById("apply-dropdown");
  if (!dd) return;
  dd.classList.toggle("hidden");
  // 点击其他地方关闭
  const close = ev => { dd.classList.add("hidden"); document.removeEventListener("click", close); };
  if (!dd.classList.contains("hidden")) setTimeout(() => document.addEventListener("click", close), 0);
}

function showSearchPanel() {
  activeKey = null;
  document.getElementById("main-area").classList.remove("detail-active");
  renderList();
}

// ─── Delete mode ──────────────────────────────────────────────────────────────
const deleteBtnEl    = document.getElementById("delete-btn");
const cancelDeleteEl = document.getElementById("cancel-delete-btn");
const selectAllRow   = document.getElementById("select-all-row");
const selectAllCb    = document.getElementById("select-all-cb");
const selectedCountEl = document.getElementById("selected-count");
const modalOverlay   = document.getElementById("modal-overlay");
const modalMsg       = document.getElementById("modal-msg");
const modalCancel    = document.getElementById("modal-cancel");
const modalConfirm   = document.getElementById("modal-confirm");
const selBox         = document.getElementById("sel-box");

function updateSelectedCount() {
  const n = selectedKeys.size;
  selectedCountEl.textContent = n > 0 ? t('msg.selected', n) : "";
  selectAllCb.indeterminate = n > 0 && n < sortedJobs().length;
  selectAllCb.checked       = n > 0 && n === sortedJobs().length;
}

function toggleSelect(key) {
  if (selectedKeys.has(key)) selectedKeys.delete(key);
  else selectedKeys.add(key);
  renderList();
  updateSelectedCount();
}

function enterDeleteMode() {
  deleteMode = true;
  selectedKeys.clear();
  cancelDeleteEl.classList.remove("hidden");
  selectAllRow.classList.remove("hidden");
  deleteBtnEl.classList.add("text-red-600", "font-semibold");
  renderList();
}

function exitDeleteMode() {
  deleteMode = false;
  selectedKeys.clear();
  cancelDeleteEl.classList.add("hidden");
  selectAllRow.classList.add("hidden");
  deleteBtnEl.classList.remove("text-red-600", "font-semibold");
  renderList();
}

deleteBtnEl.addEventListener("click", () => {
  if (!deleteMode) { enterDeleteMode(); return; }
  if (selectedKeys.size === 0) return;
  modalMsg.textContent = t('msg.delete_confirm', selectedKeys.size);
  modalOverlay.classList.remove("hidden");
});

cancelDeleteEl.addEventListener("click", exitDeleteMode);
modalCancel.addEventListener("click", () => modalOverlay.classList.add("hidden"));
modalOverlay.addEventListener("click", e => { if (e.target === modalOverlay) modalOverlay.classList.add("hidden"); });

modalConfirm.addEventListener("click", async () => {
  const keys = [...selectedKeys];
  try {
    await api("DELETE", "/api/jobs", { dedup_keys: keys });
    JOBS = JOBS.filter(j => !keys.includes(j.dedup_key));
    if (activeKey && keys.includes(activeKey)) showSearchPanel();
    modalOverlay.classList.add("hidden");
    selectedKeys.clear();
    renderList();
    updateSelectedCount();
    showToast(t('msg.deleted', keys.length));
  } catch(e) {
    showToast(`${t('msg.delete_fail')}${e.message}`, true);
  }
});

selectAllCb.addEventListener("change", () => {
  if (selectAllCb.checked) sortedJobs().forEach(j => selectedKeys.add(j.dedup_key));
  else selectedKeys.clear();
  listEl.querySelectorAll("input[type='checkbox']").forEach(cb => {
    cb.checked = selectedKeys.has(cb.dataset.key);
  });
  updateSelectedCount();
});

listEl.addEventListener("change", e => {
  const cb = e.target.closest("input[type='checkbox'][data-key]");
  if (!cb) return;
  if (cb.checked) selectedKeys.add(cb.dataset.key);
  else selectedKeys.delete(cb.dataset.key);
  updateSelectedCount();
});

// ─── Box selection ────────────────────────────────────────────────────────────
let selStart = null;

listEl.addEventListener("mousedown", e => {
  if (!deleteMode || e.target.closest("input")) return;
  selStart = { x: e.clientX, y: e.clientY };
  selBox.style.left = e.clientX + "px";
  selBox.style.top  = e.clientY + "px";
  selBox.style.width = selBox.style.height = "0";
  selBox.classList.remove("hidden");
});

document.addEventListener("mousemove", e => {
  if (!selStart) return;
  const x1 = Math.min(selStart.x, e.clientX), y1 = Math.min(selStart.y, e.clientY);
  const x2 = Math.max(selStart.x, e.clientX), y2 = Math.max(selStart.y, e.clientY);
  selBox.style.left = x1 + "px"; selBox.style.top  = y1 + "px";
  selBox.style.width = (x2-x1) + "px"; selBox.style.height = (y2-y1) + "px";

  // Check intersections
  listEl.querySelectorAll(".job-card").forEach(card => {
    const r = card.getBoundingClientRect();
    if (r.left < x2 && r.right > x1 && r.top < y2 && r.bottom > y1) {
      selectedKeys.add(card.dataset.key);
    }
  });
  updateSelectedCount();
  renderList();
});

document.addEventListener("mouseup", () => {
  if (!selStart) return;
  selStart = null;
  selBox.classList.add("hidden");
});

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  applyLang();
  await loadConfig();
  await loadJobs();

  // 恢复 CV 状态（刷新/跳转后复原）
  const savedHash    = localStorage.getItem("cv_hash");
  const savedProfile = localStorage.getItem("cv_profile");
  if (savedHash && savedProfile) {
    try {
      cvHash    = savedHash;
      cvProfile = JSON.parse(savedProfile);
      const savedTitles = localStorage.getItem("titles_list");
      if (savedTitles) titlesList = JSON.parse(savedTitles);
      showTitlesStep();

      // 若刷新时搜索仍在进行，重连 SSE 进度流
      try {
        const status = await api("GET", "/api/search/status");
        if (status.running) {
          document.getElementById("step-titles").classList.add("hidden");
          document.getElementById("step-upload").style.display = "none";
          document.getElementById("step-progress").classList.add("active");
          document.getElementById("step-done").classList.add("hidden");
          document.getElementById("progress-log").innerHTML = "";
          document.getElementById("progress-title").textContent = t("progress.title");
          listenProgress();
        }
      } catch(_) {}
    } catch(_) {
      localStorage.removeItem("cv_hash");
      localStorage.removeItem("cv_profile");
      localStorage.removeItem("titles_list");
    }
  }
}

init();

// ─── Log Panel ────────────────────────────────────────────────────────────────
let _logLevel      = "";
let _logRawLines   = [];
let _logAutoTimer  = null;
let _logOpen       = false;

function toggleLogPanel() {
  _logOpen = !_logOpen;
  const panel = document.getElementById("log-panel");
  panel.classList.toggle("open", _logOpen);
  // adjust body padding so content isn't hidden behind panel
  document.querySelector(".flex.h-full").style.paddingBottom = _logOpen ? "300px" : "0";
  if (_logOpen) {
    fetchLogs();
    startLogAuto();
  } else {
    stopLogAuto();
  }
}

function setLogLevel(btn) {
  document.querySelectorAll(".log-lvl-btn").forEach(b => b.classList.remove("active-lvl", "border-slate-300"));
  btn.classList.add("active-lvl");
  _logLevel = btn.dataset.lvl;
  fetchLogs();
}

async function fetchLogs() {
  const lines = document.getElementById("log-lines-sel").value;
  const lvl   = _logLevel;
  try {
    const data = await api("GET", `/api/logs?lines=${lines}&level=${lvl}`);
    _logRawLines = data.lines || [];
    document.getElementById("log-path").textContent = data.path || "";
    renderLogLines();
  } catch(e) {
    _logRawLines = [`[ERROR] 获取日志失败：${e.message}`];
    renderLogLines();
  }
}

function renderLogLines() {
  const query = (document.getElementById("log-search").value || "").toLowerCase();
  const container = document.getElementById("log-lines");
  const frag = document.createDocumentFragment();

  _logRawLines.forEach(line => {
    if (query && !line.toLowerCase().includes(query)) return;
    const div = document.createElement("div");
    let cls = "log-unknown";
    if (line.includes("[ERROR]"))   cls = "log-ERROR";
    else if (line.includes("[WARNING]")) cls = "log-WARNING";
    else if (line.includes("[INFO]"))    cls = "log-INFO";
    else if (line.includes("[DEBUG]"))   cls = "log-DEBUG";
    div.className = cls;
    if (query) {
      // highlight matched keyword
      const safe = line.replace(/&/g,"&amp;").replace(/</g,"&lt;");
      const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "gi");
      div.innerHTML = safe.replace(re, m => `<span class="log-search-match">${m}</span>`);
    } else {
      div.textContent = line;
    }
    frag.appendChild(div);
  });

  container.innerHTML = "";
  container.appendChild(frag);
  container.scrollTop = container.scrollHeight;
}

function clearLogView() {
  _logRawLines = [];
  document.getElementById("log-lines").innerHTML = "";
}

function startLogAuto() {
  if (_logAutoTimer) return;
  _logAutoTimer = setInterval(() => { if (_logOpen) fetchLogs(); }, 3000);
}

function stopLogAuto() {
  if (_logAutoTimer) { clearInterval(_logAutoTimer); _logAutoTimer = null; }
}

function toggleLogAuto() {
  document.getElementById("log-auto").checked ? startLogAuto() : stopLogAuto();
}

// ── Log panel resize by drag ──────────────────────────────────────────────────
(function() {
  const handle = document.getElementById("log-resize");
  const panel  = document.getElementById("log-panel");
  let startY, startH;
  handle.addEventListener("mousedown", e => {
    startY = e.clientY;
    startH = panel.offsetHeight;
    const onMove = ev => {
      const h = Math.max(120, Math.min(window.innerHeight * 0.7, startH - (ev.clientY - startY)));
      panel.style.height = h + "px";
      document.querySelector(".flex.h-full").style.paddingBottom = h + "px";
    };
    const onUp = () => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
    e.preventDefault();
  });
})();
</script>
